<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RPG CRUD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gerenciador de Personagens RPG</h1>

  <form id="charForm">
    <input type="text" id="name" placeholder="Nome do personagem" required>
    <input type="text" id="classe" placeholder="Classe (Guerreiro, Mago...)" required>
    <button type="submit">Salvar</button>
  </form>

  <h2>Lista de Personagens</h2>
  <ul id="charList"></ul>

  <script type="module" src="main.js"></script>
</body>
</html>
